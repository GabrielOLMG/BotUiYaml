pipelines:
  google_consent:
    url: $URL
    steps:
      - action: FIND
        object_type: TEXT
        text: "Consent"
        click: True
        next:
          true: init_login_pipeline
          false: init_login_pipeline

  
  login:
    steps:
      - action: FIND
        name: init_login_pipeline
        object_type: TEXT
        text: "Choose name"
        click: True
      - action: FIND
        object_type: TEXT
        text: "Username"
        y_coord: 2
        click: True
      - action: WRITE
        text: $USERNAME
        wait: 3
      - action: KEYS_SELECTIONS
        keys:
          - ENTER
      - action: FIND
        object_type: TEXT
        text: "Password"
        y_coord: 2
        until_find: retry
        click: True
      - action: WRITE
        text: $PASSWORD
      - action: KEYS_SELECTIONS
        keys:
          - ENTER
      - action: FIND
        object_type: TEXT
        text: $USERNAME
        until_find: retry
        helper: "Tentando localizar nome logado!"
        

