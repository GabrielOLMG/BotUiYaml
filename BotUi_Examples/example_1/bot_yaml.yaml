          - action: FIND
            object_type: TEXT
            text: "Battle Options" # Mudar Para Algo que Permanecesse enquant oo jogo esta ativo
            helper: Verifica While condition
            in_text: False
        do:
          - action: FIND
            object_type: TEXT
            text: "Choose"
            y_coord: 25
            click: True
            helper: Tentado Escolher Pokemon
            optional: True
          - action: FIND 
            object_type: TEXT
            text: "Attack"
            in_text: False
            y_coord: 25
            click: True
            optional: True
            helper: Tenatndo Usa Primeiro Ataque # Atravez do primeiro ataque eu consigo localizar todos os ataques!
  
