pipelines:
  teste:
    url: https://play.pokemonshowdown.com
    steps:
      - action: FIND
        object_type: TEXT
        text: Consent
        in_text: False
        click: True
        optional: True
        helper: Procura Botao de Escolha do Nome
  
  login:
    steps:
      - action: FIND
        object_type: TEXT
        text: Choose name
        in_text: False
        click: True
        helper: Procura Botao de Escolha do Nome
      - action: WRITE
        text: $USERNAME
      - action: KEYS_SELECTIONS
        keys:
          - Enter
        wait: 0.5
      - action: WRITE
        text: $PASSWORD
      - action: KEYS_SELECTIONS
        keys:
          - Enter
        wait: 1
        
  combat_format:
    steps:
      - action: FIND
        object_type: TEXT
        text: "Format:"
        y_coord: 10
        in_text: False
        click: True
        helper: Procura Botao de Escolha do Formato
        wait: 0.5
      - action: FIND
        object_type: TEXT
        text: Randomized Metas
        in_text: False
        click: True
        helper: Escolhe o Modo de Batalha
        wait: 0.3
      - action: FIND
        object_type: TEXT
        text: Challenge Cup 1v1
        in_text: False
        click: True
        helper: Escolhe o Modo de Batalha
      - action: FIND
        object_type: TEXT
        text: "Battle!"
        in_text: False
        click: True
        helper: Inicia Batalha     
        wait: 5
      - action: FIND
        object_type: TEXT
        text: "Connecting"
        helper: Esperando Conectar    
        if_find: retry
        optional: True
        wait: 1
      - action: FIND
        object_type: TEXT
        text: "Searching..."
        helper: Esperando Achar Alguem    
        if_find: retry
        optional: True
        wait: 3

  combat_loop:
    steps:
      - action: DO_WHILE
