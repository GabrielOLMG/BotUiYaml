config:
  variables:
    URL: http://automationexercise.com
    NAME: TestUser
    EMAIL: botui_is_working@example.com
    PASSWORD: test1234
    DOB_DAY: '10'
    DOB_MONTH: May
    DOB_YEAR: '1995'
    FIRST_NAME: Test
    LAST_NAME: User
    COMPANY: TestCompany
    ADDRESS1: 123 Test Street
    ADDRESS2: Apt 456
    COUNTRY: India
    STATE: TestState
    CITY: TestCity
    ZIPCODE: '12345'
    MOBILE: '9999999999'
    TITLE: Mr.
pipelines:
  signup_and_delete_account:
    url: http://automationexercise.com
    steps:
    - action: FIND
      object_type: TEXT
      text: AutomationExercise
      until_find: retry
      helper: Verify that home page is visible
    - action: FIND
      object_type: TEXT
      text: Consent
      optional: true
      click: true
      helper: Google consent
    - action: FIND
      object_type: TEXT
      text: Signup / Login
      click: true
      helper: Click Signup / Login button
    - action: FIND
      object_type: TEXT
      text: New User Signup!
      until_find: retry
      helper: Verify New User Signup is visible
    - action: FIND
      object_type: TEXT
      text: Name
      click: true
      helper: Focus on Name field
    - action: WRITE
      text: TestUser
      helper: Enter name
    - action: FIND
      object_type: TEXT
      text: Email Address
      click: true
      position: 0
      helper: Focus on Email field
    - action: WRITE
      text: botui_is_working@example.com
      helper: Enter email address
