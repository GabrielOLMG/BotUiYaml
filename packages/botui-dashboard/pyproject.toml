[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "BotUiDashboard"
version = "0.1.0"
description = "FrontEnd for BotUi"
requires-python = ">=3.10"

dependencies = [
    "streamlit>=1.30.0",
    "pillow>=10.0.0",
    "watchdog>=3.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
botui-dashboard = "BotUiDashboard.cli.main:run"