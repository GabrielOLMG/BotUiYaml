[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "BotUi"
version = "0.1.0"
description = "Core automation engine"
requires-python = ">=3.10"

dependencies = [
    "selenium",
    "opencv-python",
    "pillow",
    "pydantic",
    "pyyaml",
    "pytesseract",
    "rapidocr-onnxruntime",
    "webdriver-manager",
    "ruamel.yaml",
    "typer",
    # Teste,
    "paddleocr",
    "paddlepaddle"
]


[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
run-bot = "BotUi.cli.run:app"